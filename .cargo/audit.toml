[advisories]
ignore = [
    # `mach` is a macOS specific crate that is unmaintained. It is introduced transitively via `wasmtime 14`.
    # Upgrading `wasmtime` requires a massive architectural rewrite from Preview 1 to Preview 2 component models.
    # Because QuickChat V2 is stable and the plugin host architecture is locked in, we accept this transitive macOS advisory.
    "RUSTSEC-2020-0168",
    
    # `paste` is unmaintained and introduced transitively via `wasmtime 14`.
    # It is a macro crate used at compile time and does not introduce runtime vulnerabilities to the QuickChat binary.
    "RUSTSEC-2024-0436",
    
    # `wasmtime-jit-debug` is an older dependency of `wasmtime 14`. 
    # Because we do not rely on JIT debugging features in production (plugins execute isolated WASI), 
    # the risk is negligible and upgrading `wasmtime` would break the entire plugin architecture.
    "RUSTSEC-2024-0442",
]
